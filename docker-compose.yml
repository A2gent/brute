x-brute-common: &brute-common
  image: a2gent-brute:latest
  build:
    context: .
    dockerfile: Dockerfile
  read_only: true
  tmpfs:
    - /tmp:exec,size=256m
  environment:
    HOME: /data
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    KIMI_API_KEY: ${KIMI_API_KEY:-}
    GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
    AAGENT_PROVIDER: ${AAGENT_PROVIDER:-}
    AAGENT_MODEL: ${AAGENT_MODEL:-}
  volumes:
    - ./:/workspace
    - ${HOME}/.a2gent-data:/data

services:
  brute:
    <<: *brute-common
    container_name: a2gent-brute
    command: ["server", "--port", "8080"]
    ports:
      - "8080:8080"

  brute-tui:
    <<: *brute-common
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
